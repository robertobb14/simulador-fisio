<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Simulador Examen Fisioterapeuta</title>

  <style>
    body { 
      font-family: sans-serif; 
      background: #f4f4f4; 
      padding: 20px; 
    }

    .card { 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      max-width: 800px; 
      margin: auto; 
    }

    #opciones label { 
      display: block; 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 6px; 
      margin-bottom: 8px; 
      cursor: pointer; 
    }

    .correct { 
      background: #d4ffd9; 
      border-color: #2ecc71; 
    }

    .incorrect { 
      background: #ffd4d4; 
      border-color: #e74c3c; 
    }

    button {
      margin-right: 10px;
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Simulador Examen Fisioterapeuta</h1>

  <!-- Selector de modo aleatorio -->
  <label>
    <input type="checkbox" id="modoAleatorio">
    Orden aleatorio
  </label>

  <h3 id="num"></h3>
  <p id="pregunta"></p>

  <div id="opciones"></div>

  <p id="feedback"></p>

  <button id="corregir">Corregir</button>
  <button id="siguiente">Siguiente</button>
  <button id="anterior">Anterior</button>
  <button id="reiniciar">Reiniciar</button>
</div>

<script>
let preguntas = [];
let index = 0;
let aciertos = 0;

async function cargarPreguntas() {
  const res = await fetch("preguntas.json");
  preguntas = await res.json();

  const aleatorio = document.getElementById("modoAleatorio").checked;

  if (aleatorio) {
    preguntas = preguntas.sort(() => Math.random() - 0.5);
  }

  index = 0;
  aciertos = 0;
  mostrarPregunta();
}

function mostrarPregunta() {
  const q = preguntas[index];
  document.getElementById("num").textContent = "Pregunta " + q.id + " de " + preguntas.length;
  document.getElementById("pregunta").textContent = q.pregunta;

  const cont = document.getElementById("opciones");
  cont.innerHTML = "";

  for (const letra in q.opciones) {
    const label = document.createElement("label");
    label.className = ""; // limpiar estilos previos
    label.innerHTML = `
      <input type="radio" name="opt" value="${letra}">
      ${letra}) ${q.opciones[letra]}
    `;
    cont.appendChild(label);
  }

  document.getElementById("feedback").textContent = "";
}

document.getElementById("corregir").onclick = () => {
  const q = preguntas[index];
  const seleccion = document.querySelector("input[name='opt']:checked");

  if (!seleccion) {
    alert("Selecciona una opción");
    return;
  }

  const correcta = q.correcta;
  const labels = document.querySelectorAll("#opciones label");

  labels.forEach(l => {
    const val = l.querySelector("input").value;
    if (val === correcta) l.classList.add("correct");
    if (val === seleccion.value && val !== correcta) l.classList.add("incorrect");
  });

  if (seleccion.value === correcta) {
    document.getElementById("feedback").textContent = "¡Correcto!";
    aciertos++;
  } else {
    document.getElementById("feedback").textContent = "Incorrecto. La correcta es: " + correcta;
  }
};

document.getElementById("siguiente").onclick = () => {
  index++;
  if (index >= preguntas.length) {
    alert("Fin del examen. Aciertos: " + aciertos + "/" + preguntas.length);
    index = 0;
    aciertos = 0;
  }
  mostrarPregunta();
};

document.getElementById("anterior").onclick = () => {
  if (index > 0) {
    index--;
    mostrarPregunta();
  } else {
    alert("Estás en la primera pregunta");
  }
};

document.getElementById("reiniciar").onclick = () => {
  cargarPreguntas();
};

cargarPreguntas();
</script>

</body>
</html>
