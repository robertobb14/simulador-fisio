<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Simulador Examen Fisioterapeuta</title>

  <style>
    body { 
      font-family: sans-serif; 
      background: #f4f4f4; 
      padding: 20px; 
    }

    .card { 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      max-width: 800px; 
      margin: auto; 
    }

    #opciones label { 
      display: block; 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 6px; 
      margin-bottom: 8px; 
      cursor: pointer; 
    }

    .correct { 
      background: #d4ffd9; 
      border-color: #2ecc71; 
    }

    .incorrect { 
      background: #ffd4d4; 
      border-color: #e74c3c; 
    }

    button {
      margin-right: 10px;
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .config {
      margin-bottom: 15px;
      padding: 10px;
      background: #eef2f5;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Simulador Examen Fisioterapeuta</h1>

  <!-- Configuración -->
  <div class="config">
    <label>
      <input type="checkbox" id="modoAleatorio">
      Orden aleatorio
    </label>

      Número
