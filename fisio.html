<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Simulador Examen Fisioterapeuta</title>

  <style>
    body { 
      font-family: sans-serif; 
      background: #f4f4f4; 
      padding: 20px; 
    }

    .card { 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      max-width: 800px; 
      margin: auto; 
    }

    #opciones label { 
      display: block; 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 6px; 
      margin-bottom: 8px; 
      cursor: pointer; 
    }

    .correct { 
      background: #d4ffd9; 
      border-color: #2ecc71; 
    }

    .incorrect { 
      background: #ffd4d4; 
      border-color: #e74c3c; 
    }

    button {
      margin-right: 10px;
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .config {
      margin-bottom: 15px;
      padding: 10px;
      background: #eef2f5;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Simulador Examen Fisioterapeuta</h1>

  <!-- Configuración -->
  <div class="config">
    <label>
      <input type="checkbox" id="modoAleatorio">
      Orden aleatorio
    </label>
    <br><br>

    <label>
      Número de preguntas:
      <input type="number" id="limitePreguntas" min="1" max="500" value="50">
    </label>
    <br><br>

    <button id="reiniciar">Reiniciar</button>
  </div>

  <h3 id="num"></h3>
  <p id="pregunta"></p>

  <div id="opciones"></div>

  <p id="feedback"></p>

  <button id="corregir">Corregir</button>
  <button id="siguiente">Siguiente</button>
  <button id="anterior">Anterior</button>
</div>

<script>
let preguntas = [];
let index = 0;
let aciertos = 0;
let respuestas = []; // ← aquí guardamos la selección de cada pregunta

async function cargarPreguntas() {
  const res = await fetch("preguntas.json");
  let todas = await res.json();

  const aleatorio = document.getElementById("modoAleatorio").checked;
  let limite = parseInt(document.getElementById("limitePreguntas").value, 10);

  if (isNaN(limite) || limite <= 0) limite = todas.length;
  if (limite > todas.length) limite = todas.length;

  if (aleatorio) {
    todas = todas.sort(() => Math.random() - 0.5);
  }

  preguntas = todas.slice(0, limite);

  respuestas = [];
  index = 0;
  aciertos = 0;

  document.getElementById("resumenFinal")?.remove();

  mostrarPregunta();
}

function mostrarPregunta() {
  const q = preguntas[index];
  if (!q) return;

  document.getElementById("num").textContent =
    "Pregunta " + (index + 1) + " de " + preguntas.length;

  document.getElementById("pregunta").textContent = q.pregunta;

  const cont = document.getElementById("opciones");
  cont.innerHTML = "";

  for (const letra in q.opciones) {
    const label = document.createElement("label");
    label.className = "";

    const checked = respuestas[index] === letra ? "checked" : "";

    label.innerHTML = `
      <input type="radio" name="opt" value="${letra}" ${checked}>
      ${letra}) ${q.opciones[letra]}
    `;
    cont.appendChild(label);
  }

  document.getElementById("feedback").textContent = "";
}

// Guardar selección al marcar una opción
document.getElementById("opciones").addEventListener("change", (e) => {
  if (e.target.name === "opt") {
    respuestas[index] = e.target.value;
  }
});

// CORREGIR TODO EL EXAMEN + RESUMEN FINAL
document.getElementById("corregir").onclick = () => {
  let totalAciertos = 0;

  for (let i = 0; i < preguntas.length; i++) {
    if (respuestas[i] === preguntas[i].correcta) {
      totalAciertos++;
    }
  }

  // Crear resumen final
  const resumen = document.createElement("div");
  resumen.id = "resumenFinal";
  resumen.style.marginTop = "30px";
  resumen.style.padding = "20px";
  resumen.style.background = "#fff";
  resumen.style.borderRadius = "8px";
  resumen.style.border = "1px solid #ccc";

  let html = `<h2>Resumen del examen</h2>`;
  html += `<p><strong>Aciertos:</strong> ${totalAciertos} / ${preguntas.length}</p>`;
  html += `<hr>`;

  preguntas.forEach((p, i) => {
    const marcada = respuestas[i] ?? "(sin responder)";
    const correcta = p.correcta;
    const ok = marcada === correcta;

    html += `
      <div style="margin-bottom: 12px;">
        <strong>Pregunta ${i + 1}:</strong> ${p.pregunta}<br>
        <strong>Tu respuesta:</strong> ${marcada}<br>
        <strong>Correcta:</strong> ${correcta}<br>
        <span style="color:${ok ? "green" : "red"};">
          ${ok ? "✔ Correcto" : "✘ Incorrecto"}
        </span>
      </div>
      <hr>
    `;
  });

  resumen.innerHTML = html;

  // Eliminar resumen anterior si existe
  document.getElementById("resumenFinal")?.remove();

  // Insertar resumen al final de la tarjeta
  document.querySelector(".card").appendChild(resumen);

  alert("Resultado: " + totalAciertos + " / " + preguntas.length);
};

document.getElementById("siguiente").onclick = () => {
  index++;
  if (index >= preguntas.length) {
    alert("Fin del examen. Aciertos: " + aciertos + "/" + preguntas.length);
    index = 0;
    aciertos = 0;
  }
  mostrarPregunta();
};

document.getElementById("anterior").onclick = () => {
  if (index > 0) {
    index--;
    mostrarPregunta();
  } else {
    alert("Estás en la primera pregunta");
  }
};

document.getElementById("reiniciar").onclick = () => {
  cargarPreguntas();
};

cargarPreguntas();
</script>


</body>
</html>
